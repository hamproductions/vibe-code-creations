<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Label Printer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; top: 0; left: 0; }
            @page { size: A4; margin: 0; }
        }
        .label-cell { overflow: hidden; box-sizing: border-box; }
        .vtext { text-orientation: mixed; }
        .vtext .tcy { text-combine-upright: all; }
        @media screen { .trim-guide { border: 1px dashed #374151; } }
        @media print { .trim-guide { border: 0.5px dashed #ccc; } }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">
    <div id="root"></div>
    <script type="text/babel" src="app.js"></script>
</body>
</html>

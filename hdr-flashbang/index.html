<body class="min-h-screen flex flex-col items-center p-8">

    <div class="max-w-5xl w-full space-y-8">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-bold tracking-tighter text-white">HDR Flashbang Creator v7</h1>
            <p class="text-neutral-400">
                Mode: <code class="text-indigo-400">Hardcoded Hex Injection</code>
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Controls -->
            <div class="space-y-6 bg-neutral-900 p-6 rounded-xl border border-neutral-800 h-fit">

                <!-- 1. Input Image -->
                <div class="p-4 bg-neutral-950 rounded-lg border border-neutral-800">
                    <label class="block text-sm font-bold text-indigo-400 mb-2">1. Input Image</label>
                    <input type="file" id="fileInput" accept="image/*" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-900 file:text-indigo-200 hover:file:bg-indigo-800 cursor-pointer"/>
                </div>

                <!-- 2. Metadata Strategy -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-neutral-300">2. Metadata Strategy</label>
                    
                     <!-- Option New: Gain Map -->
                     <label class="radio-card flex items-start p-3 border border-neutral-700 rounded cursor-pointer transition-colors hover:bg-neutral-800">
                        <input type="radio" name="metaMode" value="gainmap" class="mt-1 mr-3">
                        <div class="w-full">
                            <div class="text-sm font-bold text-emerald-400">ISO 21496-1 Gain Map (New)</div>
                            <div class="text-[10px] text-neutral-400">Generates UltraHDR/AdaptiveHDR JPEG. Best for compatibility.</div>
                            
                            <!-- Hybrid Toggle -->
                            <div class="mt-2 flex items-center space-x-2 border-t border-neutral-800 pt-2" onclick="event.stopPropagation()">
                                <input type="checkbox" id="hybridMode" class="rounded bg-neutral-800 border-neutral-600 text-emerald-500 focus:ring-emerald-500">
                                <label for="hybridMode" class="text-[10px] text-neutral-300 font-mono select-none cursor-pointer">Inject Custom ICC (Hybrid)</label>
                            </div>
                        </div>
                    </label>

                    <!-- Option A: Standard -->
                    <label class="radio-card flex items-start p-3 border border-neutral-700 rounded cursor-pointer transition-colors hover:bg-neutral-800">
                        <input type="radio" name="metaMode" value="standard" class="mt-1 mr-3">
                        <div>
                            <div class="text-sm font-bold text-white">Generate Standard cICP</div>
                            <div class="text-[10px] text-neutral-400">Standard Rec.2020 PQ chunk.</div>
                        </div>
                    </label>

                    <!-- Option B: Hardcoded Hex -->
                    <label class="radio-card flex items-start p-3 border border-neutral-700 rounded cursor-pointer transition-colors hover:bg-neutral-800">
                        <input type="radio" name="metaMode" value="hex" class="mt-1 mr-3" checked>
                        <div>
                            <div class="text-sm font-bold text-pink-500">Use Hardcoded Hex</div>
                            <div class="text-[10px] text-neutral-400">Reads hex from <code>&lt;head&gt;</code> script tag.</div>
                            <div id="hexStatus" class="mt-1 text-[9px] font-mono text-neutral-500">Waiting for check...</div>
                        </div>
                    </label>

                    <!-- Option C: Clone -->
                    <label class="radio-card flex items-start p-3 border border-neutral-700 rounded cursor-pointer transition-colors hover:bg-neutral-800">
                        <input type="radio" name="metaMode" value="clone" class="mt-1 mr-3">
                        <div>
                            <div class="text-sm font-bold text-yellow-500">Clone Reference File</div>
                            <input type="file" id="refInput" accept="image/png" class="mt-2 block w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[10px] file:bg-yellow-900 file:text-yellow-200 hover:file:bg-yellow-800 cursor-pointer" onclick="document.querySelector('input[value=clone]').checked = true"/>
                        </div>
                    </label>
                </div>

                <!-- 3. Gain -->
                <div>
                    <label class="block text-sm font-medium mb-2 text-neutral-300 flex justify-between">
                        <span>3. Exposure Gain</span>
                        <span id="gainValue" class="text-indigo-400 font-mono">1.0</span>
                    </label>
                    <input type="range" id="gainSlider" min="0.1" max="50.0" step="0.1" value="1.0" class="w-full h-2 bg-neutral-700 rounded-lg appearance-none cursor-pointer">
                    <div class="flex justify-between text-[10px] text-neutral-500 mt-1 font-mono">
                        <span>100 nits</span>
                        <span>1,000 nits</span>
                        <span>10,000+ nits</span>
                    </div>
                </div>


                <!-- 4. Export Settings -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold text-neutral-300">4. Export Constraints</label>
                    <div class="p-3 bg-neutral-950 rounded border border-neutral-800 flex items-center space-x-3">
                        <input type="checkbox" id="forceSizeLimit" class="w-4 h-4 rounded bg-neutral-800 border-neutral-600 text-emerald-500 focus:ring-emerald-500">
                        <div>
                            <label for="forceSizeLimit" class="block text-sm font-bold text-white cursor-pointer">Force Output < 700KB</label>
                            <div class="text-[10px] text-neutral-500">Iteratively reduces quality/resolution to meet limit.</div>
                        </div>
                    </div>
                    <div class="p-3 bg-neutral-950 rounded border border-neutral-800 flex items-center space-x-3">
                        <input type="checkbox" id="twitterMode" class="w-4 h-4 rounded bg-neutral-800 border-neutral-600 text-sky-500 focus:ring-sky-500">
                        <div>
                            <label for="twitterMode" class="block text-sm font-bold text-white cursor-pointer">Twitter Mode (400x400)</label>
                            <div class="text-[10px] text-neutral-500">Center crops to 400x400px & enforces < 700KB.</div>
                        </div>
                    </div>
                </div>

                <!-- Action -->
                <div class="pt-4 border-t border-neutral-800 space-y-3">
                    <button id="downloadBtn" class="w-full py-4 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed group" disabled>
                        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span>Generate Preview</span>
                    </button>
                    <button id="saveBtn" class="w-full py-3 px-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2 hidden group">
                        <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        <span>Save Generated PNG</span>
                    </button>
                    <div id="logArea" class="hidden p-2 text-[10px] text-neutral-400 font-mono bg-black rounded border border-neutral-800 h-32 overflow-y-auto"></div>
                </div>
            </div>

            <!-- Preview -->
            <div class="flex flex-col items-center justify-center bg-black rounded-xl border border-neutral-800 overflow-hidden relative min-h-[400px] shadow-2xl">
                <div class="canvas-container absolute inset-0 z-0 opacity-50"></div>
                <canvas id="webgpuCanvas" class="max-w-full max-h-[500px] z-10 shadow-black drop-shadow-2xl"></canvas>
                <img id="resultPreview" class="hidden max-w-full max-h-[500px] z-10 shadow-black drop-shadow-2xl" alt="Generated HDR Preview" />
                <canvas id="exportCanvas" class="hidden"></canvas>

                <div id="loadingOverlay" class="hidden absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center backdrop-blur-sm">
                    <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                    <span id="loadingText" class="text-indigo-400 font-mono text-sm animate-pulse">Processing...</span>
                </div>

                <div id="previewBadge" class="hidden absolute top-4 right-4 bg-emerald-600/90 text-white text-[10px] font-bold px-2 py-1 rounded backdrop-blur-sm z-20 shadow-lg border border-emerald-400/50">
                    WEBGPU ACTIVE
                </div>
            </div>
        </div>
        
        <!-- Test Mode Section -->
        <div class="border-t border-neutral-800 pt-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-white">Strategy Comparison Test</h2>
                <button id="runTestBtn" class="py-2 px-6 bg-neutral-800 hover:bg-neutral-700 text-indigo-400 font-bold rounded-lg transition-colors disabled:opacity-50" disabled>
                    Run All Strategies
                </button>
            </div>
            <div id="testResults" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 hidden">
                <!-- Results injected here -->
            </div>
        </div>
    </div>

<script type="module" src="./app.js"></script>
</body>
</html>

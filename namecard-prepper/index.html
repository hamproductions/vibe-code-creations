<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namecard Print Prepper (100x148mm)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="app.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md w-full border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-gray-100">Namecard Prepress</h2>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Upload 2 or 4-Page PDF</label>
                <input type="file" id="pdfInput" accept="application/pdf"
                       class="block w-full text-sm text-gray-400
                              file:mr-4 file:py-2 file:px-4
                              file:rounded-md file:border-0
                              file:text-sm file:font-semibold
                              file:bg-blue-600 file:text-white
                              hover:file:bg-blue-700 cursor-pointer bg-gray-700 rounded-md border border-gray-600">
            </div>

            <div class="flex items-center mt-4">
                <input id="rotateBacks" type="checkbox" checked class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500 focus:ring-2">
                <label for="rotateBacks" class="ml-2 text-sm font-medium text-gray-300">
                    Rotate Back Pages 180° (Head-to-Toe Duplex)
                </label>
            </div>

            <div class="flex items-center mt-2">
                <input id="fakeBleed" type="checkbox" checked class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500 focus:ring-2">
                <label for="fakeBleed" class="ml-2 text-sm font-medium text-gray-300">
                    Auto-Generate 3mm Bleed (Edge Extension)
                </label>
            </div>

            <button id="processBtn" disabled
                    class="w-full mt-6 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                Process & Download PDF
            </button>

            <p id="statusText" class="text-sm text-gray-400 mt-2 text-center">Awaiting PDF file...</p>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-700 text-xs text-gray-500 space-y-1">
            <p>• Output Canvas: 100x148mm</p>
            <p>• Imprint Area: 2 Cards (91x55mm each)</p>
            <p>• Alignment: 31mm Top Margin</p>
            <p>• Bleed: Adds 3mm overlap around edges to prevent white borders on cuts.</p>
        </div>
    </div>

</body>
</html>
